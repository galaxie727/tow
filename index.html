<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>デカブサTD proto 横画面版</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#050505;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
}
:root{
  --bg1:#0c0c0e;
  --bg2:#17171c;
  --line:rgba(255,255,255,.12);
  --panel:rgba(255,255,255,.06);
  --panel2:rgba(255,255,255,.08);
  --textDim:rgba(255,255,255,.75);
  --good:#8ff0c1;
  --bad:#ff9b9b;
  --accent:#ffd463;
}
body{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.06), transparent 25%),
    linear-gradient(90deg, #0a0a0c 0%, #17171b 45%, #101014 100%);
}

.app{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom)) 12px;
  gap:10px;
}

/* 上部 */
.topbar{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  padding:4px 2px 0;
}
.title-wrap{
  min-width:0;
}
.title{
  font-size:22px;
  font-weight:800;
  letter-spacing:.02em;
}
.sub{
  margin-top:2px;
  font-size:12px;
  color:var(--textDim);
}
.meta{
  text-align:right;
  white-space:nowrap;
}
.meta .time{
  font-size:14px;
  color:var(--textDim);
}
.meta .cost{
  margin-top:4px;
  font-size:30px;
  font-weight:900;
  color:var(--accent);
  line-height:1;
}

/* HPバー */
.status{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.hpbox{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px 12px;
}
.hphead{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin-bottom:8px;
}
.bar{
  width:100%;
  height:14px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
  border:1px solid rgba(255,255,255,.05);
}
.fill{
  height:100%;
  width:100%;
  border-radius:999px;
  transition:width .2s linear;
}
.fill.player{ background:linear-gradient(90deg,#7fe5b6,#8ff0c1); }
.fill.enemy{ background:linear-gradient(90deg,#ffb3b3,#ff8f8f); }

/* メイン */
.main{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:1fr 320px;
  gap:12px;
}

/* 戦場 */
.battle-panel{
  position:relative;
  min-width:0;
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid var(--line);
  border-radius:20px;
  overflow:hidden;
}
.battle-header{
  position:absolute;
  inset:10px 12px auto 12px;
  z-index:5;
  display:flex;
  justify-content:space-between;
  pointer-events:none;
  font-size:14px;
  color:rgba(255,255,255,.8);
}
.field{
  position:absolute;
  inset:0;
}
.lane{
  position:absolute;
  left:0; right:0;
  top:50%;
  height:110px;
  transform:translateY(-50%);
  border-top:2px solid rgba(255,255,255,.10);
  border-bottom:2px solid rgba(255,255,255,.06);
  background:
    linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)),
    repeating-linear-gradient(
      90deg,
      transparent 0 79px,
      rgba(255,255,255,.03) 79px 80px
    );
}
.base{
  position:absolute;
  top:50%;
  width:110px;
  height:170px;
  transform:translateY(-50%);
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:800;
  font-size:18px;
  line-height:1.35;
  z-index:2;
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter: blur(6px);
}
.base.player{
  left:20px;
  color:#fff;
  background:rgba(140,240,193,.14);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
}
.base.enemy{
  right:20px;
  color:#fff;
  background:rgba(255,155,155,.16);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
}
.unit{
  position:absolute;
  bottom:44px;
  width:72px;
  user-select:none;
  pointer-events:none;
  transform:translateX(-50%);
  z-index:3;
}
.unit .sprite{
  width:72px;
  height:72px;
  object-fit:contain;
  display:block;
  margin:0 auto;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.35));
}
.unit .name{
  margin-top:2px;
  font-size:12px;
  text-align:center;
  white-space:nowrap;
  text-shadow:0 2px 8px rgba(0,0,0,.8);
}
.unit .hp{
  width:56px;
  height:6px;
  margin:4px auto 0;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,.14);
}
.unit .hp > i{
  display:block;
  height:100%;
  width:100%;
  background:#fff;
}

.hit{
  position:absolute;
  width:16px;
  height:16px;
  border-radius:50%;
  background:rgba(255,255,255,.85);
  box-shadow:0 0 16px rgba(255,255,255,.8);
  pointer-events:none;
  z-index:6;
  animation:hitFlash .25s ease-out forwards;
}
@keyframes hitFlash{
  from{transform:scale(.6);opacity:1}
  to{transform:scale(2.1);opacity:0}
}

/* 右カラム */
.side{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-height:0;
}
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:12px;
}
.card-title{
  font-size:15px;
  font-weight:800;
  margin-bottom:10px;
}
.unit-list{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.spawn-btn{
  width:100%;
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  color:#fff;
  padding:10px;
  display:grid;
  grid-template-columns:58px 1fr auto;
  gap:10px;
  align-items:center;
}
.spawn-btn:active{ transform:scale(.99) }
.spawn-btn.disabled{
  opacity:.42;
  filter:grayscale(.25);
}
.spawn-btn img{
  width:58px;
  height:58px;
  object-fit:contain;
}
.spawn-main{
  text-align:left;
}
.spawn-name{
  font-size:16px;
  font-weight:800;
}
.spawn-cost{
  margin-top:4px;
  color:var(--accent);
  font-weight:700;
  font-size:14px;
}
.spawn-sub{
  margin-top:2px;
  font-size:12px;
  color:var(--textDim);
}
.cool{
  font-size:12px;
  color:var(--textDim);
  white-space:nowrap;
}

.log{
  flex:1;
  min-height:120px;
  overflow:auto;
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:10px;
  font-size:13px;
  line-height:1.55;
  color:rgba(255,255,255,.9);
}
.log-line{ margin-bottom:3px }

.bottom-note{
  font-size:12px;
  color:rgba(255,255,255,.6);
  text-align:center;
}

.overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.58);
  z-index:20;
  padding:20px;
}
.overlay.show{ display:flex }
.result{
  width:min(560px,100%);
  background:linear-gradient(180deg, rgba(30,30,34,.96), rgba(14,14,16,.96));
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  padding:26px 20px;
  text-align:center;
  box-shadow:0 16px 50px rgba(0,0,0,.45);
}
.result h2{
  margin:0 0 10px;
  font-size:30px;
}
.result p{
  margin:0 0 16px;
  color:var(--textDim);
}
.result button{
  appearance:none;
  border:none;
  background:#fff;
  color:#000;
  font-weight:800;
  font-size:16px;
  border-radius:14px;
  padding:12px 22px;
}

@media (max-width: 950px){
  .main{
    grid-template-columns:1fr 290px;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title-wrap">
      <div class="title">デカブサTD proto</div>
      <div class="sub">横画面版・1枚絵PNGで動く・1人用試作版</div>
    </div>
    <div class="meta">
      <div class="time" id="timeText">時間 0.0s</div>
      <div class="cost" id="costText">50</div>
    </div>
  </div>

  <div class="status">
    <div class="hpbox">
      <div class="hphead"><span>自基地</span><span id="playerBaseLabel">1000 / 1000</span></div>
      <div class="bar"><div class="fill player" id="playerBaseBar"></div></div>
    </div>
    <div class="hpbox">
      <div class="hphead"><span>敵基地</span><span id="enemyBaseLabel">1000 / 1000</span></div>
      <div class="bar"><div class="fill enemy" id="enemyBaseBar"></div></div>
    </div>
  </div>

  <div class="main">
    <div class="battle-panel">
      <div class="battle-header">
        <div>左：デカブサ軍</div>
        <div>右：ザコ敵軍</div>
      </div>

      <div class="field" id="field">
        <div class="lane"></div>
        <div class="base player">デカブサ<br>基地</div>
        <div class="base enemy">敵<br>基地</div>
      </div>
    </div>

    <div class="side">
      <div class="card">
        <div class="card-title">出撃</div>
        <div class="unit-list" id="unitList"></div>
      </div>

      <div class="card" style="flex:1;min-height:0;display:flex;flex-direction:column;">
        <div class="card-title">ログ</div>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>

  <div class="bottom-note">横向き前提。敵をやや強化済み。</div>
</div>

<div class="overlay" id="overlay">
  <div class="result">
    <h2 id="resultTitle">勝利</h2>
    <p id="resultText">敵基地を破壊した。</p>
    <button id="restartBtn">もう一度</button>
  </div>
</div>

<script>
/* =========================
   画像
========================= */
const IMG = {
  dekabusa: "dekabusa.png",
  gori: "gori.png",
  latero: "latero.png",
  enemy: "enemy.png"
};

/* =========================
   ユニット定義
========================= */
const PLAYER_UNITS = [
  {
    id:"dekabusa",
    name:"デカブサ",
    img:IMG.dekabusa,
    cost:50,
    hp:150,
    atk:16,
    speed:46,
    range:38,
    interval:0.95,
    cooldown:0.0
  },
  {
    id:"gori",
    name:"ゴリさん",
    img:IMG.gori,
    cost:60,
    hp:240,
    atk:23,
    speed:32,
    range:42,
    interval:1.10,
    cooldown:0.0
  },
  {
    id:"latero",
    name:"ラテロウ",
    img:IMG.latero,
    cost:34,
    hp:90,
    atk:12,
    speed:62,
    range:34,
    interval:0.72,
    cooldown:0.0
  }
];

/* =========================
   敵強化版
========================= */
const ENEMY_TYPES = [
  {
    id:"enemy",
    name:"ザコ敵",
    img:IMG.enemy,
    hp:135,          // 前より少し高め
    atk:15,          // 少し強め
    speed:44,
    range:38,
    interval:0.95
  },
  {
    id:"enemyHeavy",
    name:"強め敵",
    img:IMG.enemy,
    hp:220,
    atk:22,
    speed:32,
    range:40,
    interval:1.15
  }
];

/* =========================
   状態
========================= */
let state;
const field = document.getElementById("field");
const unitList = document.getElementById("unitList");
const logEl = document.getElementById("log");
const costText = document.getElementById("costText");
const timeText = document.getElementById("timeText");
const playerBaseLabel = document.getElementById("playerBaseLabel");
const enemyBaseLabel = document.getElementById("enemyBaseLabel");
const playerBaseBar = document.getElementById("playerBaseBar");
const enemyBaseBar = document.getElementById("enemyBaseBar");
const overlay = document.getElementById("overlay");
const resultTitle = document.getElementById("resultTitle");
const resultText = document.getElementById("resultText");
const restartBtn = document.getElementById("restartBtn");

function resetGame(){
  state = {
    running:true,
    time:0,
    lastTs:0,
    cost:50,
    costRegen:8.5,
    playerBaseHp:1000,
    enemyBaseHp:1000,
    units:[],
    nextId:1,

    // 敵強化ポイント
    enemySpawnTimer:1.8,   // 早めに出る
    enemySpawnMin:1.9,     // 少し短い
    enemySpawnMax:3.4
  };

  field.querySelectorAll(".unit, .hit").forEach(el=>el.remove());
  logEl.innerHTML = "";
  overlay.classList.remove("show");

  PLAYER_UNITS.forEach(u => u.cooldown = 0);
  renderSpawnButtons();
  updateHud();
  addLog("戦闘開始");
  requestAnimationFrame(loop);
}

/* =========================
   UI
========================= */
function renderSpawnButtons(){
  unitList.innerHTML = "";
  PLAYER_UNITS.forEach((u, i)=>{
    const btn = document.createElement("button");
    btn.className = "spawn-btn";
    btn.innerHTML = `
      <img src="${u.img}" alt="">
      <div class="spawn-main">
        <div class="spawn-name">${i+1}. ${u.name}</div>
        <div class="spawn-cost">コスト ${u.cost}</div>
        <div class="spawn-sub">出撃</div>
      </div>
      <div class="cool" id="cool_${u.id}">OK</div>
    `;
    btn.onclick = ()=>spawnPlayerUnit(u.id);
    btn.dataset.id = u.id;
    unitList.appendChild(btn);
  });
}

function updateHud(){
  costText.textContent = Math.floor(state.cost);
  timeText.textContent = `時間 ${state.time.toFixed(1)}s`;

  playerBaseLabel.textContent = `${Math.max(0,Math.ceil(state.playerBaseHp))} / 1000`;
  enemyBaseLabel.textContent = `${Math.max(0,Math.ceil(state.enemyBaseHp))} / 1000`;

  playerBaseBar.style.width = `${Math.max(0, state.playerBaseHp / 10)}%`;
  enemyBaseBar.style.width = `${Math.max(0, state.enemyBaseHp / 10)}%`;

  PLAYER_UNITS.forEach(u=>{
    const btn = [...unitList.querySelectorAll(".spawn-btn")].find(b=>b.dataset.id===u.id);
    const cool = document.getElementById(`cool_${u.id}`);
    const usable = state.cost >= u.cost && u.cooldown <= 0 && state.running;
    btn.classList.toggle("disabled", !usable);
    cool.textContent = u.cooldown > 0 ? `${u.cooldown.toFixed(1)}s` : "OK";
  });
}

function addLog(text){
  const line = document.createElement("div");
  line.className = "log-line";
  line.textContent = text;
  logEl.prepend(line);
}

/* =========================
   出撃
========================= */
function createUnit(data, team){
  const el = document.createElement("div");
  el.className = "unit";
  el.innerHTML = `
    <img class="sprite" src="${data.img}" alt="">
    <div class="name">${data.name}</div>
    <div class="hp"><i></i></div>
  `;
  field.appendChild(el);

  const fieldW = field.clientWidth;
  const playerSpawnX = 150;
  const enemySpawnX = fieldW - 150;

  const unit = {
    uid: state.nextId++,
    team,
    name: data.name,
    img: data.img,
    hp: data.hp,
    maxHp: data.hp,
    atk: data.atk,
    speed: data.speed,
    range: data.range,
    interval: data.interval,
    attackCd: 0,
    x: team === "player" ? playerSpawnX : enemySpawnX,
    y: 0,
    el
  };
  state.units.push(unit);
  syncUnitEl(unit);
  return unit;
}

function spawnPlayerUnit(id){
  const data = PLAYER_UNITS.find(u=>u.id===id);
  if(!data || !state.running) return;
  if(state.cost < data.cost) return;
  if(data.cooldown > 0) return;

  state.cost -= data.cost;
  data.cooldown = 1.2;
  createUnit(data, "player");
  addLog(`${data.name} 出撃`);
  updateHud();
}

function spawnEnemyUnit(){
  if(!state.running) return;

  const roll = Math.random();
  const type = roll < 0.68 ? ENEMY_TYPES[0] : ENEMY_TYPES[1];
  createUnit(type, "enemy");
  addLog(`${type.name} 出現`);
}

/* =========================
   更新
========================= */
function loop(ts){
  if(!state.running) return;
  if(!state.lastTs) state.lastTs = ts;
  const dt = Math.min(0.033, (ts - state.lastTs) / 1000);
  state.lastTs = ts;
  state.time += dt;

  // コスト回復
  state.cost = Math.min(999, state.cost + state.costRegen * dt);

  // 味方クールダウン
  PLAYER_UNITS.forEach(u=>{
    if(u.cooldown > 0) u.cooldown = Math.max(0, u.cooldown - dt);
  });

  // 敵出現
  state.enemySpawnTimer -= dt;
  if(state.enemySpawnTimer <= 0){
    spawnEnemyUnit();
    state.enemySpawnTimer = rand(state.enemySpawnMin, state.enemySpawnMax);
  }

  // 戦闘更新
  updateUnits(dt);

  // HUD
  updateHud();

  // 勝敗
  if(state.enemyBaseHp <= 0){
    endGame(true);
    return;
  }
  if(state.playerBaseHp <= 0){
    endGame(false);
    return;
  }

  requestAnimationFrame(loop);
}

function updateUnits(dt){
  const fieldW = field.clientWidth;
  const playerBaseHitX = 80;
  const enemyBaseHitX = fieldW - 80;

  for(const u of state.units){
    u.attackCd = Math.max(0, u.attackCd - dt);

    const enemies = state.units.filter(v => v.team !== u.team);
    let nearest = null;
    let nearestDist = Infinity;

    for(const e of enemies){
      const d = Math.abs(e.x - u.x);
      if(d < nearestDist){
        nearest = e;
        nearestDist = d;
      }
    }

    const dir = u.team === "player" ? 1 : -1;

    if(nearest && nearestDist <= u.range){
      if(u.attackCd <= 0){
        nearest.hp -= u.atk;
        u.attackCd = u.interval;
        spawnHit((u.x + nearest.x)/2);
      }
    }else{
      u.x += dir * u.speed * dt;
    }

    // 基地攻撃
    if(u.team === "player" && u.x >= enemyBaseHitX){
      if(u.attackCd <= 0){
        state.enemyBaseHp -= u.atk;
        u.attackCd = u.interval;
        spawnHit(enemyBaseHitX);
      }
    }
    if(u.team === "enemy" && u.x <= playerBaseHitX){
      if(u.attackCd <= 0){
        state.playerBaseHp -= u.atk;
        u.attackCd = u.interval;
        spawnHit(playerBaseHitX);
      }
    }
  }

  // 死亡処理
  state.units = state.units.filter(u=>{
    if(u.hp <= 0){
      u.el.remove();
      return false;
    }
    return true;
  });

  // 位置反映
  state.units.forEach(syncUnitEl);
}

function syncUnitEl(u){
  u.el.style.left = `${u.x}px`;
  const hpw = Math.max(0, (u.hp / u.maxHp) * 100);
  u.el.querySelector(".hp > i").style.width = `${hpw}%`;
}

function spawnHit(x){
  const hit = document.createElement("div");
  hit.className = "hit";
  hit.style.left = `${x - 8}px`;
  hit.style.top = `calc(50% - 18px)`;
  field.appendChild(hit);
  setTimeout(()=>hit.remove(), 260);
}

function endGame(win){
  state.running = false;
  resultTitle.textContent = win ? "勝利" : "敗北";
  resultText.textContent = win
    ? "敵基地を破壊した。"
    : "デカブサ基地がやられた。";
  overlay.classList.add("show");
  addLog(win ? "勝利" : "敗北");
}

/* =========================
   util
========================= */
function rand(a,b){
  return a + Math.random() * (b - a);
}

restartBtn.onclick = resetGame;
resetGame();
</script>
</body>
</html>
